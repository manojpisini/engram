name: ENGRAM Security Audit
on:
  push:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'go.sum'
  pull_request:
    branches: [main]
    paths:
      - 'Cargo.lock'
      - 'package-lock.json'
      - 'requirements.txt'
      - 'go.sum'
  schedule:
    - cron: '0 6 * * *'  # Daily at 6 AM UTC
  workflow_dispatch: {}    # Allow manual trigger

env:
  ENGRAM_WEBHOOK_URL: ${{ vars.ENGRAM_WEBHOOK_URL }}
  ENGRAM_PROJECT_ID: ${{ vars.ENGRAM_PROJECT_ID }}

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-audit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        id: cargo_audit
        continue-on-error: true
        run: |
          cargo audit --json > audit_results.json 2>&1
          echo "exit_code=$?" >> $GITHUB_OUTPUT
          # Extract summary for PR comment
          VULN_COUNT=$(jq '.vulnerabilities.found // 0' audit_results.json 2>/dev/null || echo 0)
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT

      - name: Post audit results to ENGRAM
        if: env.ENGRAM_WEBHOOK_URL != ''
        run: |
          AUDIT_OUTPUT=$(cat audit_results.json 2>/dev/null || echo '{"vulnerabilities":{"found":0}}')
          curl -sf -X POST "${ENGRAM_WEBHOOK_URL}/webhook/audit" \
            -H "Content-Type: application/json" \
            -d "{
              \"project_id\": \"${ENGRAM_PROJECT_ID}\",
              \"raw_output\": $(echo "$AUDIT_OUTPUT" | jq -Rs .),
              \"tool\": \"cargo-audit\",
              \"commit_sha\": \"${{ github.sha }}\",
              \"branch\": \"${{ github.ref_name }}\"
            }" || echo "::warning::Could not reach ENGRAM webhook at ${ENGRAM_WEBHOOK_URL}"

      - name: Comment on PR
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const vulns = '${{ steps.cargo_audit.outputs.vuln_count }}';
            const status = vulns === '0' ? ':white_check_mark: No vulnerabilities found' : `:warning: ${vulns} vulnerabilities detected`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `## ENGRAM Security Audit\n${status}\n\n[View full results in ENGRAM dashboard](${process.env.ENGRAM_WEBHOOK_URL || 'http://localhost:3000'})`
            });

      - name: Upload audit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: audit_results.json
          retention-days: 30

      - name: Fail if critical vulnerabilities
        if: steps.cargo_audit.outputs.exit_code != '0'
        run: |
          echo "::error::Security vulnerabilities found. Check ENGRAM dashboard for details."
          exit 1
